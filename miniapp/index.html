<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>OMERTA SOCIETY</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Fredoka One = police très proche du logo Omerta Coffee -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
  /* ══════════════════════════════════════════════════════
     VARIABLES & RESET
  ══════════════════════════════════════════════════════ */
  :root {
    --bg:       #080f09;
    --surface:  #0d1a0f;
    --card:     #111f13;
    --orange:   #e8621a;
    --orange2:  #f5892e;
    --orange3:  #ffaa55;
    --gold:     #c9973a;
    --smoke:    #6a8060;
    --cream:    #f2e8d0;
    --wood:     #7b4f2a;
    --wood2:    #5a3618;
    --blood:    #8b1a1a;
    --green:    #2d6e3e;
    --border:   rgba(232,98,26,0.22);
    --borderl:  rgba(232,98,26,0.09);
    --safe:     env(safe-area-inset-bottom, 16px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: calc(16px + var(--safe));
  }

  /* ══════════════════════════════════════════════════════
     BACKGROUND
  ══════════════════════════════════════════════════════ */
  .bg-wrap {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 120% 50% at 50% -5%, rgba(20,50,22,0.75) 0%, transparent 65%),
      radial-gradient(ellipse 80% 80% at 0%   80%, rgba(8,15,9,0.9)    0%, transparent 55%),
      radial-gradient(ellipse 80% 80% at 100% 20%, rgba(10,20,11,0.8)  0%, transparent 55%),
      var(--bg);
  }
  .bg-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  }
  .bg-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: repeating-linear-gradient(-55deg, transparent, transparent 90px, rgba(232,98,26,0.015) 90px, rgba(232,98,26,0.015) 91px);
  }

  /* ══════════════════════════════════════════════════════
     PAGE LAYOUT
  ══════════════════════════════════════════════════════ */
  .page {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    display: flex; flex-direction: column;
  }

  /* ══════════════════════════════════════════════════════
     HERO — LOGO OMERTA SOCIETY
  ══════════════════════════════════════════════════════ */
  .hero {
    text-align: center;
    padding: 28px 16px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
    animation: fadeDown 0.7s ease both;
    overflow: visible;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -1px; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(to right, transparent, var(--orange), transparent);
  }

  /* ---- Cercle logo grand ---- */
  .logo-outer-ring {
    width: 190px; height: 190px;
    border-radius: 50%;
    border: 4px solid var(--orange);
    box-shadow:
      0 0 0 8px rgba(232,98,26,0.10),
      0 0 60px rgba(232,98,26,0.18),
      inset 0 0 40px rgba(0,0,0,0.6);
    margin: 0 auto;
    position: relative;
    overflow: visible;
  }

  .logo-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    
    position: relative;
    background: radial-gradient(circle at 50% 25%, #2a5030 0%, #0d1a0f 55%, #060e07 100%);
  }

  /* Fond jungle dans le cercle */
  .logo-inner::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 10%, rgba(40,90,40,0.6) 0%, transparent 65%),
      linear-gradient(to bottom, rgba(20,50,22,0.4) 0%, transparent 60%);
  }

  /* ---- SVG singes ---- */
  .monkeys-svg {
    width: 190px; height: 190px;
    position: absolute; top: 0; left: 0;
  }

  /* ---- Planche bois + texte ---- */
  .logo-board-wrap {
    position: relative;
    margin: -14px auto 0;
    width: 210px;
    z-index: 10;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.7));
  }

  /* Planche SVG */
  .board-svg {
    width: 100%; height: auto;
    display: block;
  }

  /* Texte sur la planche — police Fredoka One = identique logo */
  .board-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    line-height: 1;
    width: 100%;
    pointer-events: none;
  }

  .brand-omerta {
    display: block;
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    letter-spacing: 3px;
    color: var(--orange);
    /* Contour blanc comme le vrai logo */
    -webkit-text-stroke: 2.5px #ffffff;
    paint-order: stroke fill;
    text-shadow:
      0 3px 0 #7a3010,
      0 5px 15px rgba(0,0,0,0.7);
    line-height: 1;
  }

  .brand-society {
    display: block;
    font-family: 'Fredoka One', cursive;
    font-size: 34px;
    letter-spacing: 2px;
    color: var(--orange2);
    -webkit-text-stroke: 2px #ffffff;
    paint-order: stroke fill;
    text-shadow:
      0 3px 0 #7a3010,
      0 5px 12px rgba(0,0,0,0.6);
    line-height: 1;
    margin-top: -2px;
  }

  /* ---- Pays ---- */
  .countries {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    margin-top: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 2.5px; color: var(--smoke);
  }
  .countries .flag-item {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border: 1px solid rgba(232,98,26,0.15);
    background: rgba(232,98,26,0.04);
  }
  .countries .flag-item span { color: var(--orange); }

  /* ══════════════════════════════════════════════════════
     USER STRIP
  ══════════════════════════════════════════════════════ */
  .user-strip {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--borderl);
    background: rgba(232,98,26,0.04);
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .user-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 2px; flex: 1;
  }
  .verified-tag {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--orange); border: 1px solid var(--border);
    padding: 3px 8px; flex-shrink: 0;
  }

  /* ══════════════════════════════════════════════════════
     NAVIGATION TABS MOBILE
  ══════════════════════════════════════════════════════ */
  .nav-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 20;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0;
    padding: 13px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 2px;
    color: var(--smoke); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; white-space: nowrap;
    touch-action: manipulation;
  }
  .nav-tab.active {
    color: var(--orange); border-bottom-color: var(--orange);
    background: rgba(232,98,26,0.05);
  }
   /* ══════════════════════════════════════════════════════
     SECTIONS
  ══════════════════════════════════════════════════════ */
  .section { display: none; padding: 20px 14px; }
  .section.active { display: block; animation: fadeUp 0.3s ease; }

  .section-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; color: var(--orange);
  }
  .section-header::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ══════════════════════════════════════════════════════
     PRODUCT CARDS — MOBILE OPTIMISÉ
  ══════════════════════════════════════════════════════ */
  .products { display: flex; flex-direction: column; gap: 16px; }

  .product-card {
    background: linear-gradient(145deg, rgba(13,26,15,0.95), rgba(6,14,7,0.98));
    border: 1px solid var(--borderl);
    border-top: 3px solid var(--orange);
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
    border-radius: 2px;
  }
  .product-card:nth-child(1){animation-delay:.1s}
  .product-card:nth-child(2){animation-delay:.18s}
  .product-card:nth-child(3){animation-delay:.26s}
  .product-card:nth-child(4){animation-delay:.34s}
  .product-card.unavailable { opacity: 0.45; }

  /* Image */
  .prod-img-wrap {
    width: 100%; height: 200px;
    position: relative; overflow: hidden;
  }
  .prod-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .product-card:active .prod-img { transform: scale(1.02); }

  .prod-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--card) 0%, #1a3320 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  .prod-emoji-big { font-size: 64px; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
  .prod-img-label {
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--smoke);
  }

  .prod-status-badge {
    position: absolute; top: 12px; right: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: 2px;
    padding: 4px 10px; border: 1px solid;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
  }
  .badge-ok  { color: #6fcf7a; border-color: rgba(111,207,122,0.4); }
  .badge-out { color: #e05c5c; border-color: rgba(224,92,92,0.4); }

  /* Body produit */
  .prod-body { padding: 16px 14px; }

  .prod-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 10px;
  }
  .prod-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; line-height: 1; color: var(--cream);
  }
  .prod-emoji { font-size: 22px; flex-shrink: 0; margin-top: 1px; }

  .prod-desc {
    font-size: 13px; color: var(--smoke);
    line-height: 1.6; font-weight: 300; margin-bottom: 14px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
  }

  /* Grille prix — mobile scrollable horizontal */
  .price-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 8px;
  }

  .price-scroll {
    display: flex; gap: 8px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 14px;
  }
  .price-scroll::-webkit-scrollbar { display: none; }

  .price-chip {
    flex-shrink: 0;
    padding: 10px 14px;
    background: rgba(232,98,26,0.07);
    border: 1px solid var(--borderl);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    min-width: 70px;
    touch-action: manipulation;
  }
  .price-chip.selected,
  .price-chip:active {
    background: rgba(232,98,26,0.2);
    border-color: var(--orange);
  }
  .chip-qty {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 1px; display: block; color: var(--cream);
  }
  .chip-price { 
    font-size: 13px; font-weight: 600;
    color: var(--orange2); display: block; margin-top: 1px;
  }

  /* Bouton commander */
  .btn-order {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    border: none; color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px;
    cursor: pointer; touch-action: manipulation;
    box-shadow: 0 4px 24px rgba(232,98,26,0.35);
    transition: opacity 0.15s, transform 0.15s;
    -webkit-appearance: none;
  }
  .btn-order:active { opacity: 0.85; transform: scale(0.99); }

  .btn-sold-out {
    width: 100%; padding: 12px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px; color: var(--blood);
    border: 1px solid rgba(139,26,26,0.3);
  }

  /* ══════════════════════════════════════════════════════
     RÉSEAUX SOCIAUX
  ══════════════════════════════════════════════════════ */
  .socials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .social-card {
    background: var(--card);
    border: 1px solid var(--borderl);
    border-top: 2px solid var(--orange);
    padding: 16px 12px;
    text-align: center;
    text-decoration: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    touch-action: manipulation;
  }
  .social-card:active { transform: scale(0.96); background: rgba(232,98,26,0.08); }

  .social-logo {
    width: 52px; height: 52px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .social-logo img { width: 100%; height: 100%; object-fit: cover; }

  .social-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px; color: var(--cream);
  }
  .social-handle {
    font-size: 11px; color: var(--smoke);
    font-weight: 300; word-break: break-all;
  }

  .socials-empty {
    text-align: center; padding: 40px 20px;
    color: var(--smoke); font-size: 13px;
    font-style: italic; letter-spacing: 1px;
    grid-column: 1 / -1;
  }

  /* ══════════════════════════════════════════════════════
     MODAL COMMANDE — BOTTOM SHEET MOBILE
  ══════════════════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-sheet {
    width: 100%; max-width: 480px; margin: 0 auto;
    background: var(--card);
    border-top: 3px solid var(--orange);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px calc(20px + var(--safe));
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(.34,1.1,.64,1);
    max-height: 85dvh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 16px;
  }

  .modal-prod-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px; color: var(--orange);
  }
  .modal-prod-desc {
    font-size: 13px; color: var(--smoke);
    margin: 6px 0 18px; font-weight: 300; line-height: 1.6;
  }
  .modal-qty-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--gold);
    margin-bottom: 10px; font-weight: 500;
  }
  .modal-prices-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;
  }
  .modal-price-item {
    background: rgba(232,98,26,0.07); border: 1px solid var(--borderl);
    padding: 14px 12px; cursor: pointer; text-align: center;
    transition: all 0.15s; touch-action: manipulation;
  }
  .
    modal-price-item.selected { background: rgba(232,98,26,0.2); border-color: var(--orange); }
  .modal-price-item .m-qty {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px; display: block;
  }
  .modal-price-item .m-price {
    font-size: 15px; font-weight: 600;
    color: var(--orange2); display: block; margin-top: 3px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .btn-confirm {
    flex: 1; padding: 15px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    border: none; color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; cursor: pointer;
    box-shadow: 0 4px 24px rgba(232,98,26,0.35);
    -webkit-appearance: none; touch-action: manipulation;
  }
  .btn-cancel {
    padding: 15px 18px;
    background: transparent; border: 1px solid var(--border);
    color: var(--smoke);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 2px; cursor: pointer;
    touch-action: manipulation;
  }

  /* ══════════════════════════════════════════════════════
     FOOTER
  ══════════════════════════════════════════════════════ */
  .footer {
    text-align: center; padding: 24px 16px 8px;
    border-top: 1px solid var(--borderl);
  }
  .footer::before {
    content: ''; display: block; height: 1px; margin-bottom: 16px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }
  .footer-seal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px; letter-spacing: 4px; color: var(--smoke);
  }
  .footer-seal span { color: var(--orange); }

  /* ══════════════════════════════════════════════════════
     TOAST
  ══════════════════════════════════════════════════════ */
  .toast {
    position: fixed; bottom: calc(20px + var(--safe)); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border);
    color: var(--cream); padding: 12px 22px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 2px;
    border-radius: 30px;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; white-space: nowrap; z-index: 100; pointer-events: none;
    max-width: calc(100vw - 32px); text-align: center;
    white-space: normal;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ══════════════════════════════════════════════════════
     ANIMATIONS
  ══════════════════════════════════════════════════════ */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
  </style>

</head>
<body>

<div class="bg-wrap"></div>
<div class="bg-lines"></div>

<div class="page">

  <!-- ════════════════════════════════════
       HERO — LOGO OMERTA SOCIETY
  ════════════════════════════════════ -->

  <div class="hero">
<!-- Grand cercle logo avec singes NFT style BAYC -->
<div class="logo-outer-ring">
  <div class="logo-inner">

    <!-- SVG Singes BAYC Style — bien plus grands et détaillés -->
    <svg class="monkeys-svg" viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="junglebg" cx="50%" cy="25%" r="75%">
          <stop offset="0%" stop-color="#3a6b30"/>
          <stop offset="60%" stop-color="#1a3d1c"/>
          <stop offset="100%" stop-color="#080f09"/>
        </radialGradient>
        <radialGradient id="skin_l" cx="40%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#a07828"/>
          <stop offset="100%" stop-color="#6b4c0c"/>
        </radialGradient>
        <radialGradient id="skin_c" cx="50%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#8a6820"/>
          <stop offset="100%" stop-color="#5a4008"/>
        </radialGradient>
        <radialGradient id="skin_r" cx="60%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#9a7220"/>
          <stop offset="100%" stop-color="#634a0c"/>
          </radialGradient>
        <radialGradient id="face_l" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#c09030"/>
          <stop offset="100%" stop-color="#8a6418"/>
        </radialGradient>
        <radialGradient id="face_c" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#b08828"/>

<script>
/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  const u = tg.initDataUnsafe?.user;
  document.getElementById('userName').textContent =
    u ? [u.first_name, u.last_name].filter(Boolean).join(' ').toUpperCase() : 'MEMBRE';
} else {
  document.getElementById('userName').textContent = 'PRÉVISUALISATION';
}

/* ════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════ */
function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  el.classList.add('active');
  if (tg) tg.HapticFeedback?.selectionChanged();
}

/* ════════════════════════════════════════════════
   CHARGEMENT DONNÉES
════════════════════════════════════════════════ */
let shopData = null;

async function loadData() {
  try {
    const res  = await fetch('../data.json?' + Date.now());
    const data = await res.json();
    shopData = data.shop;
    renderProducts(data.shop);
    renderSocials(data.socials || []);
    renderContact(data.bot);
  } catch (e) {
    shopData = { currency: '€', products: [] };
    renderProducts(shopData);
    renderSocials([]);
    renderContact({ contact_username: '@votre_contact', info_text: 'Contactez-nous.' });
  }
}

/* ════════════════════════════════════════════════
   PRODUITS
════════════════════════════════════════════════ */
function renderProducts(shop) {
  const list = document.getElementById('productList');
  if (!shop.products || shop.products.length === 0) {
    list.innerHTML = '<div style="color:var(--smoke);text-align:center;padding:40px;font-style:italic">— Aucune sélection disponible —</div>';
    return;
  }
  list.innerHTML = shop.products.map((p, i) => `
    <div class="product-card ${p.available ? '' : 'unavailable'}">
      <div class="prod-img-wrap">
        ${p.image_url
          ? <img class="prod-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.closest('.prod-img-wrap').innerHTML=placeholder('${p.emoji}')">
          : placeholder(p.emoji)
        }
        <div class="prod-status-badge ${p.available ? 'badge-ok' : 'badge-out'}">
          ${p.available ? 'DISPONIBLE' : 'ÉPUISÉ'}
        </div>
      </div>
      <div class="prod-body">
        <div class="prod-header">
          <div class="prod-name">${p.name}</div>
          <div class="prod-emoji">${p.emoji}</div>
        </div>
        <div class="prod-desc">${p.description}</div>
        <div class="price-label">◆ TARIFS</div>
        <div class="price-scroll">
          ${(p.prices||[]).map((pr,qi) => `
            <div class="price-chip" onclick="selectChip(this,'${i}')">
              <span class="chip-qty">${pr.qty}</span>
              <span class="chip-price">${pr.price} ${shop.currency}</span>
            </div>
          `).join('')}
        </div>
        ${p.available
          ? <button class="btn-order" onclick="openModal(${i})">◆ &nbsp; COMMANDER</button>
          : <div class="btn-sold-out">ÉPUISÉ — BIENTÔT DISPONIBLE</div>
        }
      </div>
    </div>
  `).join('');
}

function placeholder(emoji) {
  return <div class="prod-placeholder"><span class="prod-emoji-big">${emoji}</span><span class="prod-img-label">Sélection exclusive</span></div>;
}

function selectChip(el, idx) {
  const card = el.closest('.prod-body');
  card.querySelectorAll('.price-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

/* ════════════════════════════════════════════════
   RÉSEAUX SOCIAUX
════════════════════════════════════════════════ */
function renderSocials(socials) {
  const grid = document.getElementById('socialsList');
  if (!socials || socials.length === 0) {
    grid.innerHTML = '<div class="socials-empty">— Aucun réseau social configuré —<br><small style="font-size:11px;letter-spacing:1px;margin-top:8px;display:block">Ajoutez-en via la page admin</small></div>';
    return;
  }
  grid.innerHTML = socials.map(s => `
    <a class="social-card" href="${s.url}" target="_blank" rel="noopener" onclick="if(tg)tg.openLink('${s.url}');return false;">
      <div class="social-logo">
        ${s.logo_url
          ? <img src="${s.logo_url}" alt="${s.name}" onerror="this.outerHTML='${s.emoji || '📱'}'"/>
          : (s.emoji || '📱')
        }
      </div>
      <div class="social-name">${s.name}</div>
      ${s.handle ? <div class="social-handle">${s.handle}</div> : ''}
    </a>
  `).join('');
}

/* ════════════════════════════════════════════════
   CONTACT
════════════════════════════════════════════════ */
function renderContact(bot) {
  const el = document.getElementById('contactInfo');
  el.innerHTML = (bot.info_text || '').replace(/\n/g, '<br>') +
    <br><br>📞 <strong>${bot.contact_username || '@votre_contact'}</strong>;
}

/* ════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════ */
let currentProduct   = null;
  let selectedQtyIndex = 0;

function openModal(idx) {
  const p = shopData.products[idx];
  currentProduct   = p;
  selectedQtyIndex = 0;

  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.description;
  document.getElementById('modalPrices').innerHTML = (p.prices||[]).map((pr,qi) => `
    <div class="modal-price-item ${qi===0?'selected':''}" onclick="selModalQty(${qi},this)">
      <span class="m-qty">${pr.qty}</span>
      <span class="m-price">${pr.price} ${shopData.currency}</span>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function selModalQty(idx, el) {
  selectedQtyIndex = idx;
  document.querySelectorAll('.modal-price-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function confirmOrder() {
  if (!currentProduct) return;
  const pr = currentProduct.prices[selectedQtyIndex];
  closeModalBtn();
  showToast(`◆ ${currentProduct.name} — ${pr.qty} — ${pr.price} ${shopData.currency}`);
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadData();
</script>

</body>
</html>
